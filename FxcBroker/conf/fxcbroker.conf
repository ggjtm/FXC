# FxcBroker configuration — localhost dev defaults (docs/DESIGN.md §5).
# Flat key=value; loaded by com.fxc.common.config.FxcConfig. Override any key with -Dkey=value.

# OFX 2.x server (FxcInvestor clients connect here over HTTP).
ofx.http.host = 0.0.0.0
ofx.http.port = 8082
# Expected OFX signon credentials — MUST match FxcInvestor's conf/fxcinvestor.conf (see PROBLEMS B9).
ofx.user = investor
ofx.password = secret
ofx.brokerId = FXC-BROKER

# Dev accounts seeded on startup (PLAN Phase 6). Both get cash AND shares so buys and sells are
# fundable and can cross each other in the demo.
account.dev = 000123456
account.dev2 = 000654321
account.seedCash = 1000000
account.seedSymbol = ACME
account.seedShares = 1000
account.seedSharePrice = 42.00

# FIX initiator to FxcExchange (order routing).
fix.exchange.host = localhost
fix.exchange.port = 9876

# FIX drop-copy initiator to FxcPub (publishes ExecutionReports).
fix.pub.host = localhost
fix.pub.port = 9878

# XMPP bot account on FxcPub (via Tigase) for human-readable fill statuses.
xmpp.host = localhost
xmpp.port = 5222
xmpp.domain = fxc.local
xmpp.user = broker
xmpp.password = broker

# Embedded GridGain node (hot state; in-memory by default).
gridgain.instanceName = fxc-broker
gridgain.persistence.enabled = false

# MariaDB cold/archival store.
db.url = jdbc:mariadb://localhost:3306/fxc_broker
db.user = fxc
db.password = fxc
