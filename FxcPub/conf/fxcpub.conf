# FxcPub configuration — localhost dev defaults (docs/DESIGN.md §5).
# Flat key=value; loaded by com.fxc.common.config.FxcConfig. Override any key with -Dkey=value.
#
# FxcPub is an XMPP *client* of stock, unmodified Tigase (docs/DESIGN.md §4.3). Tigase itself runs
# as a separate docker-compose service — it is not started or embedded by this component.

# XMPP client connection to Tigase (trusted service account).
xmpp.host = localhost
xmpp.port = 5222
xmpp.domain = fxc.local
xmpp.user = pub-service
xmpp.password = pub-service

# FIX drop-copy acceptor (brokers connect here with ExecutionReports).
fix.acceptor.host = 0.0.0.0
fix.acceptor.port = 9878

# Embedded GridGain node (hot projections: PUB_ACCOUNT, STATUS, FOLLOW; in-memory by default).
gridgain.instanceName = fxc-pub
gridgain.persistence.enabled = false

# MariaDB cold/archival store (Tigase's own repository lives in a separate schema, tigasedb).
db.url = jdbc:mariadb://localhost:3306/fxc_pub
db.user = fxc
db.password = fxc
