# FxcExchange FIX 4.4 acceptor. Brokers connect as initiators with matching reversed comp ids.
# Phase 1 uses fixed broker sessions (BROKER1/BROKER2); dynamic acceptor sessions are a later
# enhancement. DataDictionary=FIX44.xml resolves from the quickfixj-messages-fix44 classpath jar.

[DEFAULT]
ConnectionType=acceptor
BeginString=FIX.4.4
SenderCompID=EXCHANGE
UseDataDictionary=Y
DataDictionary=FIX44.xml
StartTime=00:00:00
EndTime=00:00:00
HeartBtInt=30
ReconnectInterval=5
SocketAcceptPort=9876

[SESSION]
TargetCompID=BROKER1

[SESSION]
TargetCompID=BROKER2
