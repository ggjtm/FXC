# FxcExchange configuration — localhost dev defaults (docs/DESIGN.md §5).
# Flat key=value; loaded by com.fxc.common.config.FxcConfig. Override any key with -Dkey=value.

# FIX acceptor (brokers connect here): NewOrderSingle/OrderCancelRequest in, ExecutionReport out.
fix.acceptor.host = 0.0.0.0
fix.acceptor.port = 9876

# Embedded GridGain node (hot state; in-memory by default).
gridgain.instanceName = fxc-exchange
gridgain.persistence.enabled = false

# MariaDB cold/archival store.
db.url = jdbc:mariadb://localhost:3306/fxc_exchange
db.user = fxc
db.password = fxc
