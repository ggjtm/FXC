# FxcInvestor configuration — localhost dev defaults (docs/DESIGN.md §5).
# Flat key=value; loaded by com.fxc.common.config.FxcConfig. Override any key with -Dkey=value.

# OFX 2.x client to FxcBroker.
ofx.broker.url = http://localhost:8082/ofx
ofx.user = investor
ofx.password = secret
ofx.brokerId = FXC-BROKER
account = 000123456

# XMPP client to FxcPub (via Tigase): feed in, agent commentary out. (Feed ingestion is PLAN item 3.)
xmpp.host = localhost
xmpp.port = 5222
xmpp.domain = fxc.local
xmpp.user = investor
xmpp.password = secret

# Agent loop (single-instance runner — docs/stories/004).
agent.enabled = true
agent.strategy = rando          # rando (implemented); booker/bookfish are planned (docs/stories/)
agent.symbol = ACME
agent.seedLastSale = 42.10      # ToDo: replace with XMPP-feed-derived last sale (PLAN item 3)
agent.intervalMs = 1000
agent.ticks = 10                # 0 = run until interrupted
agent.seed = 42

# MariaDB primary + archive store (FxcInvestor does not use GridGain).
db.url = jdbc:mariadb://localhost:3306/fxc_investor
db.user = fxc
db.password = fxc
