# FxcInvestor configuration — localhost dev defaults (docs/DESIGN.md §5).
# Flat key=value; loaded by com.fxc.common.config.FxcConfig. Override any key with -Dkey=value.

# OFX 2.x client to FxcBroker.
ofx.broker.url = http://localhost:8082/ofx
ofx.user = investor
ofx.password = investor

# XMPP client to FxcPub (via Tigase): home timeline in, agent commentary out.
xmpp.host = localhost
xmpp.port = 5222
xmpp.domain = fxc.local
xmpp.user = investor
xmpp.password = investor

# Agent loop.
agent.enabled = false
agent.strategy = momentum

# MariaDB primary + archive store (FxcInvestor does not use GridGain).
db.url = jdbc:mariadb://localhost:3306/fxc_investor
db.user = fxc
db.password = fxc
