# FXC dev infrastructure: one MariaDB instance + stock, unmodified Tigase XMPP server.
#
# MariaDB hosts every component's cold/archival schema (fxc_pub, fxc_broker, fxc_exchange,
# fxc_investor) AND Tigase's own repository (tigasedb). Tigase (docs/DESIGN.md §4.3) runs 100%
# unmodified from the vendor image — configured only via the mounted config.tdsl, no custom code.
#
# NOTE: the official image is `tigase/tigase-xmpp-server` (the reference docs' `tigase/tigase-server`
# was incorrect). Pinned to 8.4.1 per the confirmed version catalog.
#
# Tigase is AGPLv3 (a commercial license is available). Bringing this service up runs that software.

name: fxc

services:
  mariadb:
    image: mariadb:11.8
    container_name: fxc-mariadb
    environment:
      MARIADB_ROOT_PASSWORD: ${MARIADB_ROOT_PASSWORD:-fxc-root}
    ports:
      - "3306:3306"
    volumes:
      - fxc-mariadb-data:/var/lib/mysql
      - ./docker/mariadb/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 10

  # One-shot init (docker-compose analog of a K8s initContainer): loads Tigase's schema into
  # MariaDB with the FK-signedness compatibility fix, then exits. `tigase` waits for it to complete.
  tigase-init:
    build:
      context: ./docker/tigase
    image: fxc/tigase:8.4.1
    container_name: fxc-tigase-init
    depends_on:
      mariadb:
        condition: service_healthy
    entrypoint: ["/init-schema.sh"]
    restart: "no"

  tigase:
    # Builds a thin image around the UNMODIFIED Tigase 8.4.1 community dist on JDK 21 (the official
    # tigase/tigase-xmpp-server image is a non-runnable skeleton — see docker/tigase/Dockerfile).
    image: fxc/tigase:8.4.1
    container_name: fxc-tigase
    depends_on:
      mariadb:
        condition: service_healthy
      tigase-init:
        condition: service_completed_successfully
    ports:
      - "5222:5222"   # client-to-server (XMPP c2s) — Smack connects here
      - "5269:5269"   # server-to-server
      - "5280:5280"   # HTTP (BOSH / WebSocket / REST)
      - "8080:8080"   # HTTP admin UI
    # NOTE: config.tdsl is baked into the image (Dockerfile COPY), NOT bind-mounted — Tigase
    # rewrites/backs up its config on startup, which fails against a mounted file. Edit
    # docker/tigase/config.tdsl and rebuild to change server config.
    volumes:
      - fxc-tigase-logs:/opt/tigase/logs

volumes:
  fxc-mariadb-data:
  fxc-tigase-logs:
